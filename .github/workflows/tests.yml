name: UI Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, regression]
        environment: [qa]

    env:
      TEST_ENVIRONMENT: ${{ matrix.environment }}
      TEST_SUITE: ${{ matrix.suite }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Install Playwright browsers
        shell: pwsh
        run: pwsh bin/Release/net8.0/playwright.ps1 install --with-deps chromium

      - name: Choose suite filter
        shell: pwsh
        run: |
          $filter = if ("${{ matrix.suite }}" -eq "smoke") { "TestCategory=smoke" } else { "TestCategory=regression" }
          "DOTNET_TEST_FILTER=$filter" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run automated tests
        run: dotnet test --configuration Release --no-build --filter "${{ env.DOTNET_TEST_FILTER }}" --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Publish execution summary
        if: always()
        shell: pwsh
        run: ./scripts/Publish-TestSummary.ps1 -ResultsPath TestResults -Suite "${{ matrix.suite }}" -EnvironmentName "${{ matrix.environment }}"

      - name: Generate HTML report
        if: always()
        shell: pwsh
        run: ./scripts/Convert-TrxToHtml.ps1 -ResultsPath TestResults -OutputPath "TestResults/report-${{ matrix.suite }}-${{ matrix.environment }}.html"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: execution-artifacts-${{ matrix.suite }}-${{ matrix.environment }}
          if-no-files-found: warn
          path: |
            TestResults
            bin/Release/net8.0/artifacts
            bin/Debug/net8.0/artifacts
